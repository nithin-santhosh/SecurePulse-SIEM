<!DOCTYPE html>
<html>
<head>
    <title>SecurePulse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-slate-950 text-gray-200 font-sans">

<div class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">

        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold text-blue-500">SecurePulse</h1>
            <p class="text-xs text-gray-400">Security Operations Console</p>
        </div>

        <nav class="flex-1 p-4 space-y-2 text-sm">

            <a href="/" class="nav-item">Dashboard</a>

            <a href="/agents" class="nav-item">
                Assets
            </a>

            <a href="/alerts" class="nav-item">
                Alerts
            </a>

            <a href="/incidents" class="nav-item">
                Incidents
            </a>

            <a href="/logs" class="nav-item">
                Logs
            </a>

            <a href="/threat-intel" class="nav-item">
                Threat Intel
            </a>

            <a href="/ai-analyst" class="nav-item">
                AI Analyst
            </a>

        </nav>

        <div class="p-4 border-t border-slate-800 text-xs text-gray-500">
            SecurePulse SIEM Stack
        </div>

    </aside>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">

        <!-- TOPBAR -->
        <header class="bg-slate-900 border-b border-slate-800 px-8 py-4 flex justify-between items-center">

            <div class="text-sm text-gray-400">
                Security Monitoring Dashboard
            </div>

            <div class="flex items-center gap-6 text-sm">

                <div class="font-semibold
                {% if system_status == 'Healthy' %}
                text-green-400
                {% else %}
                text-red-400
                {% endif %}
                ">
                    System {{ system_status }}
                </div>

                <div class="text-gray-400">
                    SOC Console
                </div>

            </div>

        </header>

        <!-- CONTENT -->
        <main class="flex-1 p-10 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>

    </div>

</div>

</body>
</html>
